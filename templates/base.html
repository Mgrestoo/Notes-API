<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Notes App{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <!-- This one line gives us all Bootstrap styles — no install needed -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <!-- Our custom styles — each page can add its own -->
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">📝 Notes App</a>

            <!-- Show logout button only if token exists in localStorage -->
            <!-- localStorage = browser's built-in key-value storage -->
            <!-- We'll store the token here after login -->
            <div id="nav-auth">
                <!-- JavaScript will fill this in -->
            </div>
        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <!-- Each child template fills this block in -->
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap 5 JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Each page can add its own scripts -->
    {% block extra_js %}{% endblock %}

    <!-- Navbar auth script — runs on every page -->
    <script>
        // localStorage.getItem('token') → reads the token we saved after login
        // If token exists → show logout button
        // If no token → show nothing (or login link)
        const token = localStorage.getItem('token');
        const navAuth = document.getElementById('nav-auth');

        if (token) {
            navAuth.innerHTML = `
                <div class="d-flex align-items-center gap-3">
                    <span class="text-white">
                        👋 ${localStorage.getItem('username')}
                    </span>
                    <button class="btn btn-outline-light btn-sm" onclick="logout()">
                        Logout
                    </button>
                </div>
            `;
        }

        function logout() {
            // Remove everything we stored in the browser
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('user_id');
            // Redirect to login page
            window.location.href = '/login/';
        }
    </script>
</body>
</html>
